<style>
:root{--bg:#f7f8f5;--panel:#fff;--text:#1e2420;--muted:#667168;--line:#d8ded6;--accent:#2f7d57;--accent2:#205b8f;--soft:#e7f1eb;--wrong:#8c2f39;--warn:#ad7b23;--shadow:0 8px 24px rgba(26,42,32,.08);font-family:Arial,Helvetica,sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);line-height:1.5}.app{min-height:100vh;display:grid;grid-template-columns:300px 1fr}.sidebar{border-right:1px solid var(--line);padding:22px;background:var(--panel);position:sticky;top:0;height:100vh;overflow:auto}.brand h1{margin:0;font-size:1.35rem}.brand p,.meta,.small{color:var(--muted);font-size:.92rem}.topic-list{display:grid;gap:8px;margin-top:16px}.topic-button{width:100%;text-align:left;border:1px solid var(--line);background:var(--panel);border-radius:9px;padding:11px;cursor:pointer}.topic-button[aria-pressed=true]{border-color:var(--accent);background:var(--soft)}.main{padding:26px;display:grid;gap:16px;align-content:start}.hero{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;border-bottom:1px solid var(--line);padding-bottom:16px}.hero h2{margin:0 0 5px;font-size:1.7rem}.actions,.controls{display:flex;flex-wrap:wrap;gap:9px;align-items:center}.button{border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--text);padding:9px 12px;cursor:pointer}.button.primary{background:var(--accent);border-color:var(--accent);color:white}.tabs{display:flex;flex-wrap:wrap;gap:8px}.tab{border:1px solid var(--line);border-radius:999px;background:var(--panel);padding:8px 13px;cursor:pointer}.tab[aria-selected=true]{border-color:var(--accent);background:var(--soft);color:var(--accent);font-weight:700}.panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:20px;box-shadow:var(--shadow)}.hidden{display:none}.notes{display:grid;gap:14px}.note-section h3{margin:0 0 6px;font-size:1.08rem}.formula{display:inline-block;background:var(--soft);color:var(--accent);border-radius:8px;padding:8px 1 bold;fill:#205b8f}@media(max-width:820px){.app{display:block}.sidebar{position:static;height:auto;border-right:0;border-bottom:1px solid var(--line)}.main{padding:18px}.hero{display:grid}}
</style></head><body><div class="app"><aside class="sidebar"><div class="brand"><h1>Year 7 Science Revision</h1><p>SHSB-style KS3 revision: notes, audio, diagrams, flashcards, quizzes and vocabulary.</p></div><div class="topic-list" id="topic-list"></div></aside><main class="main"><section class="hero"><div><div class="meta" id="topic-meta"></div><h2 id="topic-title"></h2><div class="small" id="audio-status">Ready to play</div></div><div class="actions"><button class="button primary" id="play" type="button">Play</button><button class="button" id="pause" type="button">Pause</button><button class="button" id="stop" type="button">Stop</button></div></section><div class="controls"><label class="small">Speed <input id="rate" type="range" min="0.7" max="1.2" step="0.05" value="0.85"></label><label class="small">Voice <select id="voice"></select></label></div><nav class="tabs"><button class="tab" data-tab="notes" aria-selected="true">Notes</button><button class="tab" data-tab="listen" aria-selected="false">Listen by blocks</button><button class="tab" data-tab="diagrams" aria-selected="false">Diagrams</button><button class="tab" data-tab="flashcards" aria-selected="false">Flashcards</button><button class="tab" data-tab="quiz" aria-selected="false">Quiz</button><button class="tab" data-tab="vocab" aria-selected="false">Vocabulary</button><button class="tab" data-tab="progress" aria-selected="false">Progress</button></nav><section class="panel" id="notes-panel"></section><section class="panel hidden" id="listen-panel"></section><section class="panel hidden" id="diagrams-panel"></section><section class="panel hidden" id="flashcards-panel"></section><section class="panel hidden" id="quiz-panel"></section><section class="panel hidden" id="vocab-panel"></section><section class="panel hidden" id="progress-panel"></section></main></div><script>

const topics=[
{id:'earth',number:'Topic 1',title:'Earth, Water and Atmosphere',svg:earthSvg,sections:[{heading:'1. Structure of the Earth',body:'The Earth has four main layers: crust, mantle, outer core and inner core. The crust is the thin rocky surface. The mantle is hot semi-molten rock. The outer core is liquid metal. The inner core is solid metal.'},{heading:'2. Geosphere',body:'The geosphere is the solid part of Earth. It includes rocks, minerals, landforms and soil.'},{heading:'3. Hydrosphere',body:'The hydrosphere is all the water on Earth: oceans, rivers, lakes, groundwater, glaciers and water vapour. Most water is salt water. Fresh water is much less common and must be protected.'},{heading:'4. Uses of water',body:'Humans use water for drinking, washing, farming, industry, energy production and transport.'},{heading:'5. Water pollution',body:'Water can be polluted by sewage, fertilisers, pesticides, plastics, oil spills and industrial chemicals. Pollution can harm living organisms and make water unsafe.'},{heading:'6. Potabilisation of water',body:'Potabilisation means making water safe to drink. Main steps: coagulation, sedimentation, filtration, disinfection and distribution.'},{heading:'7. Wastewater treatment',body:'Wastewater treatment cleans used water before it returns to the environment. Steps include screening, settling, biological treatment, disinfection and release.'},{heading:'8. Atmosphere',body:'The atmosphere is the layer of gases surrounding Earth. It protects life, contains oxygen and carbon dioxide, produces weather, and includes the ozone layer.'}],diagrams:[{title:'Earth layers',visual:earthSvg,prompt:'Reveal the four main layers of Earth.',labels:['Crust','Mantle','Outer core','Inner core']},{title:'Atmosphere layers',visual:atmSvg,prompt:'Label the layers from lowest to highest.',labels:['Troposphere','Stratosphere','Mesosphere','Thermosphere','Exosphere']},{title:'Potabilisation steps',visual:waterSvg,prompt:'Put the water treatment steps in order.',type:'chain',answer:['Coagulation','Sedimentation','Filtration','Disinfection','Distribution'],bank:['Filtration','Coagulation','Distribution','Sedimentation','Disinfection']}],flashcards:[['What is the crust?','The thin rocky outer layer of Earth.'],['What is the hydrosphere?','All the water on Earth.'],['What is potabilisation?','The process of making water safe to drink.'],['What is wastewater?','Used water from homes, schools, farms or industry.'],['What is the atmosphere?','The layer of gases surrounding Earth.'],['Which layer of the atmosphere has weather?','The troposphere.'],['Why is the ozone layer important?','It absorbs harmful ultraviolet radiation from the Sun.']],quiz:[['Which Earth layer is the thin rocky surface?',['Mantle','Crust','Outer core'],1],['Most water on Earth is...',['fresh water','salt water','drinking water'],1],['Potabilisation means...',['making water safe to drink','making rocks','making clouds'],0],['Screening in wastewater treatment removes...',['large solids','oxygen','sunlight'],0],['Weather happens mainly in the...',['troposphere','exosphere','inner core'],0]],vocab:[['crust','corteza'],['mantle','manto'],['hydrosphere','hidrosfera'],['sewage','aguas residuales'],['filtration','filtración'],['disinfection','desinfección'],['atmosphere','atmósfera'],['ozone layer','capa de ozono']]},
{id:'living',number:'Topic 2',title:'Living Things and Cells',svg:animalCellSvg,sections:[{heading:'1. Characteristics of living things: MRS GREN',body:'Living organisms show seven life processes: Movement, Respiration, Sensitivity, Growth, Reproduction, Excretion and Nutrition.'},{heading:'2. What living things need',body:'Animals need food, water, oxygen, shelter and space. Plants need light, carbon dioxide, water, mineral salts and space.'},{heading:'3. Cell theory',body:'Cell theory says: all living things are made of cells; cells are the basic unit of life; and new cells come from existing cells.'},{heading:'4. Prokaryotic cells',body:'Prokaryotic cells, such as bacteria, are small and do not have a nucleus. Their DNA is free in the cytoplasm.'},{heading:'5. Eukaryotic cells',body:'Eukaryotic cells have a nucleus and organelles. Animals, plants, fungi and protists are eukaryotic.'},{heading:'6. Animal cells',body:'Animal cells usually have a nucleus, cytoplasm, cell membrane, mitochondria and ribosomes.'},{heading:'7. Plant cells',body:'Plant cells have everything animal cells have, and also a cell wall, chloroplasts and a permanent vacuole.'}],diagrams:[{title:'Animal cell',visual:animalCellSvg,prompt:'Label the main animal cell structures.',labels:['Nucleus','Cytoplasm','Cell membrane','Mitochondria','Ribosomes']},{title:'Plant cell',visual:plantCellSvg,prompt:'Label the plant cell structures.',labels:['Cell wall','Cell membrane','Cytoplasm','Nucleus','Chloroplasts','Permanent vacuole','Mitochondria']},{title:'Prokaryotic cell',visual:bacteriaSvg,prompt:'Label the bacterium.',labels:['Cell wall','Cell membrane','Cytoplasm','DNA free in cytoplasm','Flagellum']}],flashcards:[['What does MRS GREN stand for?','Movement, Respiration, Sensitivity, Growth, Reproduction, Excretion and Nutrition.'],['What is a cell?','The basic unit of life.'],['What is the nucleus?','It contains genetic material and controls cell activities.'],['What is cytoplasm?','A jelly-like substance where many reactions happen.'],['What is a chloroplast?','The part of a plant cell where photosynthesis happens.'],['What is a prokaryotic cell?','A cell with no nucleus, such as a bacterial cell.'],['What is a eukaryotic cell?','A cell with a nucleus.']],quiz:[['Which is NOT part of MRS GREN?',['Movement','Respiration','Electricity'],2],['Plant cells have chloroplasts for...',['photosynthesis','movement','hearing'],0],['Bacteria are usually...',['prokaryotic','mammals','vertebrates'],0],['The nucleus contains...',['DNA','soil','water only'],0],['Animal cells do not have...',['cell membrane','cell wall','cytoplasm'],1]],vocab:[['living organism','ser vivo'],['cell','célula'],['nucleus','núcleo'],['cytoplasm','citoplasma'],['cell membrane','membrana celular'],['cell wall','pared celular'],['chloroplast','cloroplasto'],['vacuole','vacuola'],['bacteria','bacterias']]},
{id:'classification',number:'Topic 3',title:'Classification and Vertebrates',svg:vertebratesSvg,sections:[{heading:'1. Why scientists classify organisms',body:'Classification groups living organisms according to shared characteristics. It helps scientists identify, compare and name organisms.'},{heading:'2. Classification order',body:'The order is Kingdom, Phylum, Class, Order, Family, Genus, Species.',formula:'King Philip Came Over For Good Soup'},{heading:'3. Worked example: humans',body:'Humans are classified as Animalia, Chordata, Mammalia, Primates, Hominidae, Homo, Homo sapiens.'},{heading:'4. Binomial name',body:'A binomial name has two parts: genus and species. For humans, the binomial name is Homo sapiens.'},{heading:'5. Vertebrates',body:'Vertebrates are animals with a backbone. The five main vertebrate groups are fish, amphibians, reptiles, birds and mammals.'},{heading:'6. Vertebrate characteristics',body:'Fish have gills, scales and fins. Amphibians have moist skin and often lay eggs in water. Reptiles have dry scales and lungs. Birds have feathers and lay eggs. Mammals have hair or fur and produce milk for their young.'}],diagrams:[{title:'Classification hierarchy',prompt:'Put the classification levels in order.',type:'chain',answer:['Kingdom','Phylum','Class','Order','Family','Genus','Species'],bank:['Class','Species','Kingdom','Family','Phylum','Genus','Order']},{title:'Vertebrate groups',visual:vertebratesSvg,prompt:'Reveal the five groups and their key characteristics.',labels:['Fish: gills, scales, fins','Amphibians: moist skin, eggs in water','Reptiles: dry scales, lungs','Birds: feathers, eggs','Mammals: fur or hair, milk']}],flashcards:[['What is classification?','Grouping organisms using shared characteristics.'],['What comes after Family?','Genus.'],['What is a species?','A group of similar organisms that can reproduce to make fertile offspring.'],['What is a binomial name?','A two-part scientific name: genus and species.'],['What is a vertebrate?','An animal with a backbone.'],['Why is a whale a mammal, not a fish?','It breathes with lungs, is warm-blooded, gives birth and feeds young with milk.']],quiz:[['Which order is correct?',['Kingdom, Phylum, Class, Order, Family, Genus, Species','Species, Genus, Family, Order, Class, Phylum, Kingdom','Kingdom, Family, Class, Species'],0],['The genus in Homo sapiens is...',['sapiens','Homo','Animalia'],1],['Which group has feathers?',['Birds','Reptiles','Fish'],0],['Which group has gills and fins?',['Mammals','Fish','Birds'],1],['Vertebrates have...',['a backbone','no cells','no organs'],0]],vocab:[['kingdom','reino'],['phylum','filo'],['class','clase'],['order','orden'],['family','familia'],['genus','género'],['species','especie'],['vertebrate','vertebrado'],['backbone','columna vertebral']]},
{id:'ecosystems',number:'Topic 4',title:'Ecosystems and Trophic Chains',svg:foodWebSvg,sections:[{heading:'1. Ecosystems',body:'An ecosystem is a natural system made of living organisms, the physical environment and the interactions between them.',formula:'ECOSYSTEM = BIOCENOSIS + BIOTOPE + INTERACTIONS'},{heading:'2. Producers',body:'Producers make their own food by photosynthesis. Examples include grass, trees, algae and phytoplankton.'},{heading:'3. Consumers',body:'Consumers eat other organisms. Primary consumers eat producers. Secondary consumers eat primary consumers. Tertiary consumers are often top predators.'},{heading:'4. Decomposers',body:'Decomposers break down dead organisms and waste material. Examples include fungi and bacteria. They recycle nutrients into the soil.'},{heading:'5. Food chains',body:'A food chain shows feeding relationships and energy transfer. Arrows mean “is eaten by” and show the direction of energy flow.'},{heading:'6. Food webs',body:'A food web is made of many connected food chains in one ecosystem. It shows that organisms can have more than one food source.'},{heading:'7. Predator and prey',body:'A predator hunts and eats another animal. The prey is the animal that is hunted.'}],diagrams:[{title:'Build a woodland food chain',type:'chain',prompt:'Tap the organisms in the correct order.',answer:['Oak tree','Caterpillar','Robin','Hawk'],bank:['Robin','Oak tree','Hawk','Caterpillar']},{title:'Build a marine food chain',type:'chain',prompt:'Tap the organisms in the correct order.',answer:['Phytoplankton','Krill','Fish','Seal','Orca'],bank:['Seal','Phytoplankton','Orca','Fish','Krill']},{title:'Build a pond food chain',type:'chain',prompt:'Tap the organisms in the correct order.',answer:['Algae','Snail','Fish','Heron'],bank:['Fish','Heron','Algae','Snail']},{title:'Food web',visual:foodWebSvg,prompt:'Reveal key labels for this food web.',labels:['Grass is the producer','Rabbit and mouse are primary consumers','Fox and owl are predators','Arrows show energy flow']}],flashcards:[['What is a producer?','An organism that makes its own food by photosynthesis.'],['What is a primary consumer?','An organism that eats producers. Usually a herbivore.'],['What is a secondary consumer?','An organism that eats primary consumers.'],['What is a decomposer?','An organism that breaks down dead material and recycles nutrients.'],['What do arrows mean in a food chain?','They mean “is eaten by” and show energy transfer.'],['What is a food web?','Many connected food chains.'],['What is prey?','An animal that is hunted by a predator.']],quiz:[['In grass → rabbit → fox, the producer is...',['grass','rabbit','fox'],0],['In grass → caterpillar → frog → snake, the secondary consumer is...',['caterpillar','frog','grass'],1],['Decomposers include...',['fungi and bacteria','only lions','only grass'],0],['A food web is...',['one straight chain only','many connected food chains','a type of rock'],1],['Arrows in food chains show...',['energy flow','rainfall','cell walls'],0]],vocab:[['producer','productor'],['consumer','consumidor'],['primary consumer','consumidor primario'],['secondary consumer','consumidor secundario'],['tertiary consumer','consumidor terciario'],['decomposer','descomponedor'],['food chain','cadena trófica'],['food web','red trófica'],['predator','depredador'],['prey','presa']]},
{id:'plants',number:'Topic 5',title:'Plants',svg:plantCellSvg,sections:[{heading:'1. Plant kingdom',body:'Plants are multicellular eukaryotic organisms. Plant cells have a nucleus, chloroplasts, cell wall and large vacuole.'},{heading:'2. Photosynthesis',body:'Plants are autotrophic. They make their own food using water, carbon dioxide and sunlight. Photosynthesis happens in chloroplasts.',formula:'WATER + CARBON DIOXIDE + SUNLIGHT → OXYGEN + GLUCOSE'},{heading:'3. Roots, stem and leaves',body:'Roots absorb water and minerals. The stem supports the plant and transports substances. Leaves carry out photosynthesis and gas exchange.'},{heading:'4. Xylem and phloem',body:'Xylem transports water and minerals from roots to leaves. Phloem transports sugars from leaves to the rest of the plant.'},{heading:'5. Flowers',body:'Flowers are reproductive organs. Stamens are male parts. The pistil/carpel is the female part. Pollination moves pollen to the stigma.'}],diagrams:[{title:'Plant cell',visual:plantCellSvg,prompt:'Label the plant cell.',labels:['Cell wall','Cell membrane','Cytoplasm','Nucleus','Chloroplasts','Permanent vacuole']},{title:'Photosynthesis equation',prompt:'Put the equation in order.',type:'chain',answer:['Water','Carbon dioxide','Sunlight','Glucose','Oxygen'],bank:['Oxygen','Sunlight','Water','Glucose','Carbon dioxide']}],flashcards:[['Where does photosynthesis happen?','In chloroplasts.'],['What does xylem carry?','Water and mineral salts from roots to leaves.'],['What does phloem carry?','Sugars/food from leaves to the rest of the plant.'],['What are stomata?','Tiny openings in leaves for gas exchange.'],['What are stamens?','The male reproductive parts of a flower.']],quiz:[['Photosynthesis needs...',['water, carbon dioxide and light','oxygen only','soil only'],0],['Xylem carries...',['water and minerals','pollen','eggs'],0],['The male part of a flower is the...',['stamen','ovary','root'],0],['Plant cells have...',['chloroplasts','no nucleus','no membrane'],0]],vocab:[['photosynthesis','fotosíntesis'],['chloroplast','cloroplasto'],['xylem','xilema'],['phloem','floema'],['stomata','estomas'],['stamen','estambre'],['pistil/carpel','pistilo/carpelo'],['pollination','polinización']]}

let currentTopic=topics[0],cardIndex=0,showingBack=false,voices=[],progress=loadProgress();const panels=['notes','listen','diagrams','flashcards','quiz','vocab','progress'];const $=id=>document.getElementById(id);function normCards(t){t.flashcards=t.flashcards.map(c=>Array.isArray(c)?{front:c[0],back:c[1]}:c);t.quiz=t.quiz.map(q=>Array.isArray(q)?{question:q[0],options:q[1],answer:q[2]}:q)}topics.forEach(normCards);function loadProgress(){try{return JSON.parse(localStorage.getItem('science-y7-progress-v2'))||{}}catch(e){return{}}}function topicProgress(t){if(!progress[t.id])progress[t.id]={listened:false,flashcardsSeen:0,quizAttempts:0,bestScore:0,reviewed:false};return progress[t.id]}function saveProgress(){localStorage.setItem('science-y7-progress-v2',JSON.stringify(progress))}function updateTopicProgress(t,u){progress[t.id]={...topicProgress(t),...u};saveProgress();renderProgress()}function renderTopics(){const list=$('topic-list');list.innerHTML='';topics.forEach(t=>{const b=document.createElement('button');b.className='topic-button';b.type='button';b.setAttribute('aria-pressed',t.id===currentTopic.id?'true':'false');b.innerHTML=`<strong>${t.number}</strong><br>${t.title}`;b.onclick=()=>{currentTopic=t;cardIndex=0;showingBack=false;stopSpeech();render()};list.appendChild(b)})}function renderNotes(){$('notes-panel').innerHTML=`<div class="notes"><div class="illustration">${currentTopic.svg||''}</div>${currentTopic.sections.map(s=>`<article class="note-section"><h3>${s.heading}</h3><p>${s.body}</p>${s.formula?`<div class="formula">${s.formula}</div>`:''}</article>`).join('')}</div>`}
function speakText(text,label){
  if(!('speechSynthesis' in window)){setStatus('Speech is not supported in this browser');return}
  speechSynthesis.cancel();
  const clean=(text||'').replace(/→/g,' to ').replace(/\+/g,' plus ').replace(/=/g,' equals ');
  const chunks=clean.match(/.{1,220}(\s|$)/g)||[clean];
  chunks.forEach((chunk,i)=>{const u=new SpeechSynthesisUtterance(chunk);u.lang='en-GB';u.rate=+$('rate').value;u.voice=selectedVoice();u.onstart=()=>setStatus((label||'Playing')+` ${i+1}/${chunks.length}`);u.onend=()=>{if(i===chunks.length-1)setStatus('Finished')};u.onerror=()=>setStatus('Audio could not be played');speechSynthesis.speak(u)});
}
function renderListen(){
  const blocks=currentTopic.sections.map((s,i)=>({title:s.heading,text:`${s.heading}. ${s.body}. ${s.formula?'Remember: '+s.formula+'.':''}`}));
  const vocabText=currentTopic.vocab.map(v=>`${v[0]} means ${v[1]}`).join('. ');
  const flashText=currentTopic.flashcards.map(c=>`Question: ${c.front}. Answer: ${c.back}`).join('. ');
  $('listen-panel').innerHTML=`<div class="notes"><article class="note-section"><h3>Audio revision for ${currentTopic.title}</h3><p>Use these buttons to listen in short blocks. Best routine: listen once, repeat vocabulary, then do flashcards and quiz.</p><div class="actions"><button class="button primary" id="listen-topic">Play whole topic</button><button class="button" id="listen-vocab">Play vocabulary Spanish-English</button><button class="button" id="listen-flashcards">Play flashcards</button></div></article>${blocks.map((b,i)=>`<article class="note-section"><h3>${i+1}. ${b.title}</h3><p>${b.text}</p><button class="button primary" type="button" data-listen-block="${i}">Listen to this block</button></article>`).join('')}</div>`;
  $('listen-topic').onclick=()=>playSpeech();
  $('listen-vocab').onclick=()=>speakText(vocabText,'Vocabulary');
  $('listen-flashcards').onclick=()=>speakText(flashText,'Flashcards');
  document.querySelectorAll('[data-listen-block]').forEach(btn=>btn.onclick=()=>speakText(blocks[+btn.dataset.listenBlock].text,'Block'));
}
function renderDiagrams(){const ds=currentTopic.diagrams||[];if(!ds.length){$('diagrams-panel').innerHTML='<p>No diagram practice yet.</p>';return}$('diagrams-panel').innerHTML=`<div class="diagram-grid">${ds.map((d,i)=>`<article class="diagram-card"><div><h3>${d.title}</h3><p class="small">${d.prompt}</p></div>${d.visual?`<div class="illustration">${d.visual}</div>`:''}${d.type==='chain'?`<div class="chain-bank">${d.bank.map(item=>`<button class="chain-pill" type="button" data-chain-pick="${i}" data-value="${item}">${item}</button>`).join('')}</div><div class="chain-answer" data-chain-answer="${i}">Tap items above to build the chain.</div><div class="feedback" data-chain-feedback="${i}"></div><div class="actions"><button class="button primary" data-check-chain="${i}">Check</button><button class="button" data-reset-chain="${i}">Reset</button></div>`:`<div class="label-grid">${d.labels.map((lab,j)=>`<div class="blank-label" data-diagram="${i}" data-label="${j}">${j+1}. ______</div>`).join('')}</div><div class="actions"><button class="button primary" data-reveal-diagram="${i}">Reveal labels</button><button class="button" data-hide-diagram="${i}">Hide labels</button></div>`}</article>`).join('')}</div>`;const answers={};document.querySelectorAll('[data-chain-pick]').forEach(btn=>btn.onclick=()=>{const i=btn.dataset.chainPick;answers[i]=answers[i]||[];answers[i].push(btn.dataset.value);btn.disabled=true;document.querySelector(`[data-chain-answer="${i}"]`).textContent=answers[i].join(' → ');document.querySelector(`[data-chain-feedback="${i}"]`).textContent=''});document.querySelectorAll('[data-check-chain]').forEach(btn=>btn.onclick=()=>{const i=btn.dataset.checkChain,d=ds[+i],given=answers[i]||[],ok=given.length===d.answer.length&&given.every((x,j)=>x===d.answer[j]),f=document.querySelector(`[data-chain-feedback="${i}"]`);f.className='feedback '+(ok?'correct':'wrong');f.textContent=ok?'Correct: '+d.answer.join(' → '):'Try again. Correct order: '+d.answer.join(' → ')});document.querySelectorAll('[data-reset-chain]').forEach(btn=>btn.onclick=()=>{const i=btn.dataset.resetChain;answers[i]=[];document.querySelector(`[data-chain-answer="${i}"]`).textContent='Tap items above to build the chain.';document.querySelector(`[data-chain-feedback="${i}"]`).textContent='';document.querySelectorAll(`[data-chain-pick="${i}"]`).forEach(p=>p.disabled=false)});document.querySelectorAll('[data-reveal-diagram]').forEach(btn=>btn.onclick=()=>{const i=btn.dataset.revealDiagram,d=ds[+i];document.querySelectorAll(`[data-diagram="${i}"]`).forEach(box=>{box.textContent=(+box.dataset.label+1)+'. '+d.labels[+box.dataset.label];box.classList.add('revealed')})});document.querySelectorAll('[data-hide-diagram]').forEach(btn=>btn.onclick=()=>{const i=btn.dataset.hideDiagram;document.querySelectorAll(`[data-diagram="${i}"]`).forEach(box=>{box.textContent=(+box.dataset.label+1)+'. ______';box.classList.remove('revealed')})})}function renderFlashcards(){const c=currentTopic.flashcards[cardIndex];$('flashcards-panel').innerHTML=`<div class="card-view"><div class="meta">Card ${cardIndex+1} of ${currentTopic.flashcards.length}</div><div class="flashcard">${showingBack?c.back:c.front}</div><div class="actions"><button class="button primary" id="flip-card">${showingBack?'Show question':'Show answer'}</button><button class="button" id="prev-card">Previous</button><button class="button" id="next-card">Next</button></div></div>`;$('flip-card').onclick=()=>{showingBack=!showingBack;updateTopicProgress(currentTopic,{flashcardsSeen:Math.max(topicProgress(currentTopic).flashcardsSeen,cardIndex+1)});renderFlashcards()};$('prev-card').onclick=()=>{cardIndex=(cardIndex-1+currentTopic.flashcards.length)%currentTopic.flashcards.length;showingBack=false;renderFlashcards()};$('next-card').onclick=()=>{cardIndex=(cardIndex+1)%currentTopic.flashcards.length;showingBack=false;updateTopicProgress(currentTopic,{flashcardsSeen:Math.max(topicProgress(currentTopic).flashcardsSeen,cardIndex+1)});renderFlashcards()}}function renderQuiz(){$('quiz-panel').innerHTML=`<div class="quiz">${currentTopic.quiz.map((q,i)=>`<div class="question"><strong>${i+1}. ${q.question}</strong>${q.options.map((o,j)=>`<label class="option"><input type="radio" name="q-${i}" value="${j}"><span>${o}</span></label>`).join('')}</div>`).join('')}<div class="actions"><button class="button primary" id="check-quiz">Check answers</button><span class="result" id="quiz-result"></span></div></div>`;$('check-quiz').onclick=()=>{let score=0;currentTopic.quiz.forEach((q,i)=>{const selected=document.querySelector(`input[name="q-${i}"]:checked`);if(selected&&+selected.value===q.answer)score++;const question=document.querySelectorAll('.question')[i];const old=question.querySelector('.feedback');if(old)old.remove();const f=document.createElement('div'),ok=selected&&+selected.value===q.answer;f.className='feedback '+(ok?'correct':'wrong');f.textContent=ok?'Correct: '+q.options[q.answer]:'Review. Correct answer: '+q.options[q.answer];question.appendChild(f)});$('quiz-result').textContent=`${score}/${currentTopic.quiz.length} correct`;$('quiz-result').className='result '+(score===currentTopic.quiz.length?'correct':'wrong');const p=topicProgress(currentTopic);updateTopicProgress(currentTopic,{quizAttempts:p.quizAttempts+1,bestScore:Math.max(p.bestScore,score)})}}function renderVocab(){$('vocab-panel').innerHTML=`<div class="vocab-grid">${currentTopic.vocab.map(v=>`<div class="vocab-card"><strong>${v[0]}</strong><span>${v[1]}</span></div>`).join('')}</div>`}function renderProgress(){$('progress-panel').innerHTML=`<div class="progress-grid">${topics.map(t=>{const p=topicProgress(t),total=t.flashcards.length,quiz=t.quiz.length;return`<article class="progress-card"><div><div class="meta">${t.number}</div><h3>${t.title}</h3></div><div class="actions"><span class="badge ${p.listened?'done':''}">${p.listened?'Listened':'Audio pending'}</span><span class="badge ${p.flashcardsSeen>=total?'done':''}">${Math.min(p.flashcardsSeen,total)}/${total} cards</span><span class="badge ${p.bestScore===quiz?'done':''}">Best quiz: ${p.bestScore}/${quiz}</span><span class="badge ${p.reviewed?'done':''}">${p.reviewed?'Reviewed':'Not reviewed'}</span></div><div class="actions"><button class="button primary" data-review="${t.id}">${p.reviewed?'Unmark reviewed':'Mark reviewed'}</button><button class="button" data-reset="${t.id}">Reset topic</button></div></article>`}).join('')}</div>`;document.querySelectorAll('[data-review]').forEach(b=>b.onclick=()=>{const t=topics.find(x=>x.id===b.dataset.review);updateTopicProgress(t,{reviewed:!topicProgress(t).reviewed})});document.querySelectorAll('[data-reset]').forEach(b=>b.onclick=()=>{delete progress[b.dataset.reset];saveProgress();renderProgress()})}function render(){renderTopics();$('topic-meta').textContent=currentTopic.number;$('topic-title').textContent=currentTopic.title;renderNotes();renderListen();renderDiagrams();renderFlashcards();renderQuiz();renderVocab();renderProgress()}function setActiveTab(name){document.querySelectorAll('.tab').forEach(t=>t.setAttribute('aria-selected',t.dataset.tab===name?'true':'false'));panels.forEach(p=>$(p+'-panel').classList.toggle('hidden',p!==name))}document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>setActiveTab(t.dataset.tab));function textFromTopic(t){return [t.number,t.title,...t.sections.flatMap(s=>[s.heading,s.body,s.formula||''])].join('. ')}function setStatus(m){$('audio-status').textContent=m}function loadVoices(){if(!('speechSynthesis'in window)){setStatus('Speech is not supported in this browser');return}voices=speechSynthesis.getVoices();const english=voices.filter(v=>(v.lang||'').toLowerCase().startsWith('en')),use=english.length?english:voices;$('voice').innerHTML=use.map(v=>`<option value="${v.name}">${v.name} (${v.lang})</option>`).join('')||'<option>Default browser voice</option>'}function selectedVoice(){return voices.find(v=>v.name===$('voice').value)||null}function playSpeech(){if(!('speechSynthesis'in window)){setStatus('Speech is not supported');return}if(speechSynthesis.paused){speechSynthesis.resume();setStatus('Playing');return}speechSynthesis.cancel();const chunks=textFromTopic(currentTopic).match(/.{1,220}(\s|$)/g)||[textFromTopic(currentTopic)];chunks.forEach((chunk,i)=>{const u=new SpeechSynthesisUtterance(chunk);u.lang='en-GB';u.rate=+$('rate').value;u.voice=selectedVoice();u.onstart=()=>setStatus(`Playing ${i+1}/${chunks.length}`);u.onend=()=>{if(i===chunks.length-1){setStatus('Finished');updateTopicProgress(currentTopic,{listened:true})}};u.onerror=()=>setStatus('Audio could not be played');speechSynthesis.speak(u)})}function pauseSpeech(){if('speechSynthesis'in window&&speechSynthesis.speaking){speechSynthesis.pause();setStatus('Paused')}}function stopSpeech(){if('speechSynthesis'in window){speechSynthesis.cancel();setStatus('Stopped')}}$('play').onclick=playSpeech;$('pause').onclick=pauseSpeech;$('stop').onclick=stopSpeech;$('rate').oninput=()=>{if('speechSynthesis'in window&&speechSynthesis.speaking)playSpeech()};render();if('speechSynthesis'in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices}
</script></body></html>
